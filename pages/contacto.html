<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,400;0,600;0,700;0,800;1,100;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css">
    <title>Contacto</title>
</head>
<body>
    <header>
        <img class="img-logo" src="../img/Blockbuster_logo.png" alt="Logo Blockbuster">
        
        <nav class="header-nav">
        <ul>
            <li><a href="../index.html">Inicio</a></li>
            <li><a href="./contacto.html">Contacto</a></li>
        </ul>
        </nav>
    </header>
    <main>
        <h1 class="titulo-contacto">Contactanos</h1>

    <form action="https://formspree.io/f/mwvwqwyv" method="POST" class="formulario"
>
    <label for="nombre">Nombre:</label>
     <input type="text" id="nombre" name="nombre" required>
    
     <label for="email">Correo electrónico:</label>
     <input type="email" id="email" name="email" required>
    
     <label for="mensaje">Mensaje:</label>
     <textarea id="mensaje" name="mensaje" rows="4" cols="50" required></textarea>
  <button class="btn" type="submit">Enviar
  </button>
</form>
    </main>
    <footer>
      <p>Sitio realizado por Ashley Augustower para la entrega de Talento Tech</p>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/whatsapp.png" alt="logo de whatsapp" /></li>
          <li><img src="../img/instagram.png" alt="logo de instagram" /></li>
        </ul>
      </nav>
    </footer>
</body>
</html>
